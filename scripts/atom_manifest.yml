# Atom-to-upstream function mapping.
# Used by harvest_io.py to instrument upstream repos and capture I/O fixtures.
#
# Fields:
#   atom        — ageoa atom key (module_path:function_name)
#   upstream:
#     repo      — directory name under third_party/
#     module    — Python dotted import path (or Julia/Rust equivalent)
#     function  — upstream callable name
#     language  — python | julia | rust

