# atom_manifest.yml
# Comprehensive mapping of every stub atom function to its upstream implementation.
# Generated 2026-03-15
#
# Legend:
#   atom        – ageoa module path : function name
#   repo        – third_party directory name
#   module      – dotted source path within the upstream repo
#   function    – upstream function / method / type name
#   language    – python | julia | rust | cpp | haskell
#   crate       – (rust only) crate name
#   notes       – any clarifying context

